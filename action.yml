name: AOS Workflow Gate
description: >-
  Find merge-control gaps that a green GitHub view can miss. Get a
  PASS/WARN/BLOCK verdict, one next action, and a replayable decision.
  Read-only and advisory by default. Decision records carry
  UNSIGNED_NOT_OFFICIAL verification status; no production, compliance,
  signing, SLSA, or security-audit claim is made.
branding:
  icon: check-circle
  color: gray-dark

inputs:
  input:
    description: >-
      Path to the signal bundle JSON. Leave empty for Self-Test Mode
      (zero-config): the completed check runs of the current commit are
      collected from the GitHub API and gated with an explicit generated
      advisory policy. Self-Test Mode needs no checkout.
    required: false
    default: ""
  policy:
    description: >-
      Path to the policy JSON or YAML. With an explicit input bundle it
      defaults to the bundled advisory default policy; in zero-config mode
      it defaults to the generated advisory policy.
    required: false
    default: ""
  required-checks:
    description: >-
      Self-Test Mode only. Comma- or newline-separated check run names to
      mark required in the generated policy; a missing or failed required
      check makes the verdict BLOCK.
    required: false
    default: ""
  sarif:
    description: >-
      Self-Test Mode only. Newline-separated paths to existing SARIF 2.1.0
      files. AOS reads the files locally and never runs the scanner; checkout
      and SARIF generation must happen in earlier steps.
    required: false
    default: ""
  wait-for-checks:
    description: >-
      Self-Test Mode only. Polling budget for required controls. With
      automatic GitHub requirement discovery, "0" uses the built-in
      120-second stabilization window; a positive value overrides it.
      With explicit required-checks, "0" means no polling. A wait that
      ends incomplete fails closed and is recorded in collection evidence.
    required: false
    default: "0"
  out:
    description: Path where the decision record JSON is written.
    required: false
    default: gate-decision.json
  mode:
    description: >-
      "advisory" (default) reports the verdict without failing the job;
      "enforce" makes a BLOCK verdict fail the step.
    required: false
    default: "advisory"
  policy-pack:
    description: >-
      Bundled starter policy by name (minimal-pr-gate, release-candidate,
      agent-review-advisory, evidence-integrity). Ignored when "policy"
      is set. See docs/POLICY_PACKS.md.
    required: false
    default: ""
  upload-artifact:
    description: >-
      Upload the decision record, the .aos-gate/ evidence files, and the
      static evidence.html as the "aos-gate-evidence" artifact (runs
      even when an enforced BLOCK fails the evaluate step). Enabled by
      default so first runs keep their evidence; set "false" to skip.
      Artifacts expire per repository settings - attach the files to a
      release for permanence.
    required: false
    default: "true"
  enforce:
    description: >-
      Deprecated alias: "true" behaves like mode "enforce".
    required: false
    default: "false"

outputs:
  verdict:
    description: The gate verdict (PASS, WARN, or BLOCK).
    value: ${{ steps.evaluate.outputs.verdict }}
  record:
    description: Path to the decision record JSON.
    value: ${{ steps.evaluate.outputs.record }}
  record-digest:
    description: Self-digest of the decision record.
    value: ${{ steps.evaluate.outputs.record-digest }}
  can-block:
    description: >-
      Whether this evaluation, as configured, could fail the job on a
      BLOCK verdict ("true"/"false").
    value: ${{ steps.evaluate.outputs.can-block }}
  diagnosis:
    description: One line - the verdict and what AOS found.
    value: ${{ steps.evaluate.outputs.diagnosis }}
  next-action:
    description: The single dominant next step for the operator.
    value: ${{ steps.evaluate.outputs.next-action }}
  decision-contrast:
    description: >-
      Relationship to GitHub's required-check baseline, such as
      github_already_blocks or aos_policy_gap.
    value: ${{ steps.evaluate.outputs.decision-contrast }}
  incremental-gap:
    description: >-
      Whether this verdict adds a policy/evidence gap beyond a clear GitHub
      required-check baseline ("true"/"false").
    value: ${{ steps.evaluate.outputs.incremental-gap }}
  required-total:
    description: Number of required sources in the policy.
    value: ${{ steps.evaluate.outputs.required-total }}
  required-successful:
    description: Required sources that concluded success.
    value: ${{ steps.evaluate.outputs.required-successful }}
  required-missing:
    description: Required sources absent from the bundle (state missing).
    value: ${{ steps.evaluate.outputs.required-missing }}
  required-pending:
    description: Required sources still running when collected.
    value: ${{ steps.evaluate.outputs.required-pending }}
  required-unverifiable:
    description: >-
      Required sources that could not be shown to satisfy their
      requirement (app-bound identity or unreadable stream).
    value: ${{ steps.evaluate.outputs.required-unverifiable }}
  required-failed:
    description: Required sources that concluded non-success.
    value: ${{ steps.evaluate.outputs.required-failed }}
  advisory-warnings:
    description: Advisory warnings in the decision.
    value: ${{ steps.evaluate.outputs.advisory-warnings }}

runs:
  using: "composite"
  steps:
    - name: Install gate
      shell: bash
      run: python3 -m pip install --quiet "$GITHUB_ACTION_PATH"
    - name: Evaluate
      id: evaluate
      shell: bash
      env:
        GATE_INPUT: ${{ inputs.input }}
        GATE_POLICY: ${{ inputs.policy }}
        GATE_POLICY_PACK: ${{ inputs.policy-pack }}
        GATE_OUT: ${{ inputs.out }}
        GATE_MODE: ${{ inputs.mode }}
        GATE_ENFORCE: ${{ inputs.enforce }}
        GATE_REQUIRED_CHECKS: ${{ inputs.required-checks }}
        GATE_SARIF: ${{ inputs.sarif }}
        GATE_WAIT_FOR_CHECKS: ${{ inputs.wait-for-checks }}
        GITHUB_TOKEN: ${{ github.token }}
        AOS_GATE_WORKSPACE: ${{ github.workspace }}
      run: |
        set -u
        case "$GATE_OUT" in
          *$'\n'*|*$'\r'*)
            echo "error: out path must not contain control characters" >&2
            exit 2
            ;;
        esac
        mode="$GATE_MODE"
        if [ "$GATE_ENFORCE" = "true" ]; then
          mode="enforce"
        fi
        args=(run --out "$GATE_OUT" --mode "$mode")
        if [ -n "$GATE_INPUT" ]; then
          args+=(--input "$GATE_INPUT")
          if [ -z "$GATE_POLICY" ] && [ -z "$GATE_POLICY_PACK" ]; then
            GATE_POLICY="$GITHUB_ACTION_PATH/policies/default.yml"
          fi
        else
          args+=(--github-context
            --bundle-out .aos-gate/bundle.json
            --policy-out .aos-gate/policy.json
            --wait-seconds "${GATE_WAIT_FOR_CHECKS:-0}")
          while IFS= read -r name; do
            name="$(printf '%s' "$name" \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            if [ -n "$name" ]; then
              args+=(--require "$name")
            fi
          done <<< "$(printf '%s' "$GATE_REQUIRED_CHECKS" | tr ',' '\n')"
          while IFS= read -r path; do
            path="$(printf '%s' "$path" \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            if [ -n "$path" ]; then
              args+=(--sarif "$path")
            fi
          done <<< "$GATE_SARIF"
        fi
        if [ -n "$GATE_POLICY" ]; then
          args+=(--policy "$GATE_POLICY")
        elif [ -n "$GATE_POLICY_PACK" ]; then
          args+=(--policy-pack "$GATE_POLICY_PACK")
        fi
        set +e
        python3 -m aos_workflow_gate "${args[@]}"
        rc=$?
        set -e
        if [ -f "$GATE_OUT" ]; then
          python3 -m aos_workflow_gate summarize --input "$GATE_OUT" \
            >> "$GITHUB_STEP_SUMMARY" || true
          python3 -c 'import json,os;from aos_workflow_gate.summarize import render_github_annotation;value=render_github_annotation(json.load(open(os.environ["GATE_OUT"])));print(value) if value else None' \
            || true
          if [ -f .aos-gate/bundle.json ]; then
            python3 -c 'import json; c = json.load(open(".aos-gate/bundle.json")).get("collection", {}); inc = c.get("incomplete_required") or []; extra = " - still running when the wait ended: " + ", ".join(str(n) for n in inc) if inc else ""; print("Collection: " + str(c.get("status", "unknown")) + extra)' \
              >> "$GITHUB_STEP_SUMMARY" || true
          fi
          required_count=$(python3 -c "import json,os;from aos_workflow_gate.summarize import diagnose;print(diagnose(json.load(open(os.environ['GATE_OUT'])))['counts']['required_total'])")
          {
            echo ""
            if [ "$required_count" = "0" ]; then
              echo "No required control was observed. Keep this run" \
                "advisory; define a repository requirement only after" \
                "the named gap and remediation match the intended policy."
            else
              echo "Keep the gate advisory until repeated runs show" \
                "stable requirements, useful remediation, and acceptable" \
                "noise for this repository."
            fi
            echo ""
            echo "Replay path: record \`$GATE_OUT\`, bundle" \
              "\`.aos-gate/bundle.json\`, policy \`.aos-gate/policy.json\`" \
              "(artifact \`aos-gate-evidence\` when upload-artifact is true)."
            echo ""
            echo "Evidence view: \`.aos-gate/evidence.html\` (in the" \
              "artifact). Artifacts expire per repository settings;" \
              "attach the files to a release for permanence."
            echo ""
            echo "Reproduce locally (download the uploaded artifacts first):"
            echo '```bash'
            echo "pip install \"git+https://github.com/RafineriaAI/aos-workflow-gate@${GITHUB_ACTION_REF:-main}\""
            echo "aos-workflow-gate verify --input gate-decision.json --bundle bundle.json"
            echo "aos-workflow-gate summarize --input gate-decision.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f .aos-gate/bundle.json ] && [ -f .aos-gate/policy.json ]; then
            python3 -m aos_workflow_gate summarize --input "$GATE_OUT" --html --bundle .aos-gate/bundle.json --policy .aos-gate/policy.json --out .aos-gate/evidence.html || true
          else
            mkdir -p .aos-gate && python3 -m aos_workflow_gate summarize --input "$GATE_OUT" --html --out .aos-gate/evidence.html || true
          fi
          {
            echo "verdict=$(python3 -c "import json,os;print(json.load(open(os.environ['GATE_OUT']))['verdict'])")"
            echo "record=$GATE_OUT"
            echo "record-digest=$(python3 -c "import json,os;print(json.load(open(os.environ['GATE_OUT']))['record_digest'])")"
            echo "can-block=$(python3 -c "import json,os;print(str(json.load(open(os.environ['GATE_OUT']))['can_block']).lower())")"
          } >> "$GITHUB_OUTPUT"
          python3 -c "import json,os;from aos_workflow_gate.summarize import diagnose;d=diagnose(json.load(open(os.environ['GATE_OUT'])));c=d['counts'];clean=lambda v:str(v).replace('\r',' ').replace('\n',' ');out=open(os.environ['GITHUB_OUTPUT'],'a',encoding='utf-8');out.write('diagnosis='+str(d['verdict'])+': '+clean(d['finding'])+'\n');out.write('next-action='+clean(d['next'])+'\n');out.write('decision-contrast='+clean(d['contrast']['code'])+'\n');out.write('incremental-gap='+str(bool(d['contrast']['incremental'])).lower()+'\n');out.write('required-total=%d\nrequired-successful=%d\nrequired-missing=%d\nrequired-pending=%d\nrequired-unverifiable=%d\nrequired-failed=%d\nadvisory-warnings=%d\n'%(c['required_total'],c['required_successful'],c['required_missing'],c['required_pending'],c['required_unverifiable'],c['required_failed'],c['advisory_warnings']))" || true
        fi
        exit "$rc"
    # Pinned from actions/upload-artifact@v7.0.1 on 2026-07-04.
    - name: Upload evidence
      if: ${{ always() && inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: aos-gate-evidence
        path: |
          ${{ inputs.out }}
          .aos-gate/
        # .aos-gate/ is a dot-directory: without this flag the upload
        # silently skips it and the replay path ships without its bundle
        # and policy.
        include-hidden-files: "true"
        if-no-files-found: warn
