name: AOS Workflow Gate
description: >-
  Evidence-based workflow gate: turn a signal bundle plus an explicit policy
  into a deterministic PASS/WARN/BLOCK decision record that is replayable and
  tamper-evident. Advisory by default. Decision records carry
  UNSIGNED_NOT_OFFICIAL verification status; no production, compliance,
  signing, SLSA, or security-audit claim is made.
branding:
  icon: check-circle
  color: gray-dark

inputs:
  input:
    description: >-
      Path to the signal bundle JSON. Leave empty for Self-Test Mode
      (zero-config): the completed check runs of the current commit are
      collected from the GitHub API and gated with an explicit generated
      advisory policy. Self-Test Mode needs no checkout.
    required: false
    default: ""
  policy:
    description: >-
      Path to the policy JSON or YAML. With an explicit input bundle it
      defaults to the bundled advisory default policy; in zero-config mode
      it defaults to the generated advisory policy.
    required: false
    default: ""
  required-checks:
    description: >-
      Self-Test Mode only. Comma- or newline-separated check run names to
      mark required in the generated policy; a missing or failed required
      check makes the verdict BLOCK.
    required: false
    default: ""
  out:
    description: Path where the decision record JSON is written.
    required: false
    default: gate-decision.json
  enforce:
    description: >-
      Set to "true" to exit non-zero on BLOCK regardless of policy mode.
      Default is advisory; the step succeeds and the verdict is reported.
    required: false
    default: "false"

outputs:
  verdict:
    description: The gate verdict (PASS, WARN, or BLOCK).
    value: ${{ steps.evaluate.outputs.verdict }}
  record:
    description: Path to the decision record JSON.
    value: ${{ steps.evaluate.outputs.record }}
  record-digest:
    description: Self-digest of the decision record.
    value: ${{ steps.evaluate.outputs.record-digest }}

runs:
  using: "composite"
  steps:
    - name: Install gate
      shell: bash
      run: python3 -m pip install --quiet "$GITHUB_ACTION_PATH"
    - name: Evaluate
      id: evaluate
      shell: bash
      env:
        GATE_INPUT: ${{ inputs.input }}
        GATE_POLICY: ${{ inputs.policy }}
        GATE_OUT: ${{ inputs.out }}
        GATE_ENFORCE: ${{ inputs.enforce }}
        GATE_REQUIRED_CHECKS: ${{ inputs.required-checks }}
        GITHUB_TOKEN: ${{ github.token }}
        AOS_GATE_WORKSPACE: ${{ github.workspace }}
      run: |
        set -u
        case "$GATE_OUT" in
          *$'\n'*|*$'\r'*)
            echo "error: out path must not contain control characters" >&2
            exit 2
            ;;
        esac
        input="$GATE_INPUT"
        policy="$GATE_POLICY"
        if [ -z "$input" ]; then
          collect_args=(--github-context --out .aos-gate/bundle.json
            --policy-out .aos-gate/policy.json)
          while IFS= read -r name; do
            name="$(printf '%s' "$name" \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            if [ -n "$name" ]; then
              collect_args+=(--require "$name")
            fi
          done <<< "$(printf '%s' "$GATE_REQUIRED_CHECKS" | tr ',' '\n')"
          python3 -m aos_workflow_gate collect "${collect_args[@]}"
          input=.aos-gate/bundle.json
          if [ -z "$policy" ]; then
            policy=.aos-gate/policy.json
          fi
        fi
        if [ -z "$policy" ]; then
          policy="$GITHUB_ACTION_PATH/policies/default.yml"
        fi
        args=(--input "$input" --policy "$policy" --out "$GATE_OUT")
        if [ "$GATE_ENFORCE" = "true" ]; then
          args+=(--enforce)
        fi
        set +e
        python3 -m aos_workflow_gate evaluate "${args[@]}"
        rc=$?
        set -e
        if [ -f "$GATE_OUT" ]; then
          python3 -m aos_workflow_gate summarize --input "$GATE_OUT" \
            >> "$GITHUB_STEP_SUMMARY" || true
          required_count=$(python3 -c "import json,os;print(sum(1 for i in json.load(open(os.environ['GATE_OUT'])).get('inputs',[]) if i.get('required')))")
          {
            echo ""
            if [ "$required_count" = "0" ]; then
              echo "Self-Test complete. This gate records evidence but" \
                "cannot BLOCK yet: set the required-checks input to" \
                "enforce, or [request guided-pilot scoping](https://github.com/RafineriaAI/aos-workflow-gate/issues/new?template=guided-pilot-scoping.yml)" \
                "to design an enforceable gate policy for your workflows."
            else
              echo "Need help extending this gate across repositories or" \
                "platforms? [Request guided-pilot scoping](https://github.com/RafineriaAI/aos-workflow-gate/issues/new?template=guided-pilot-scoping.yml)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo "verdict=$(python3 -c "import json,os;print(json.load(open(os.environ['GATE_OUT']))['verdict'])")"
            echo "record=$GATE_OUT"
            echo "record-digest=$(python3 -c "import json,os;print(json.load(open(os.environ['GATE_OUT']))['record_digest'])")"
          } >> "$GITHUB_OUTPUT"
        fi
        exit "$rc"
