name: Guided pilot request
description: >-
  Request scoping for a paid, guided pilot of aos-workflow-gate in your
  workflow. Submitting this form requests scoping, not a commitment on
  either side.
title: "[Pilot] "
labels: ["pilot-request"]
body:
  - type: markdown
    attributes:
      value: >-
        A guided pilot is a paid engagement: we define the gate policy for
        one real workflow of yours, wire the action or CLI in, and hand
        over replayable decision records with measured results. The public
        repository stays free (Apache-2.0); the pilot pays for guidance,
        policy design, and evaluation on your data. No confidential
        material in this public form, please.
  - type: input
    id: organization
    attributes:
      label: Organization or context
      placeholder: company / team / project
    validations:
      required: true
  - type: dropdown
    id: engagement
    attributes:
      label: Engagement type
      description: >-
        Design partner runs at reduced scope fee in exchange for structured
        feedback (see docs/GUIDED_PILOT.md).
      options:
        - Guided pilot
        - Design partner
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: CI platform
      options:
        - GitHub.com
        - GitHub Enterprise Server
        - GitLab (SaaS or self-managed)
        - Jenkins
        - Other / mixed
    validations:
      required: true
  - type: dropdown
    id: scale
    attributes:
      label: Approximate scale
      options:
        - 1-5 repositories
        - 6-50 repositories
        - 51+ repositories
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: What should the gate protect?
      placeholder: >-
        e.g. AI-agent-generated pull requests before merge; release
        candidates; scanner findings before deploy
    validations:
      required: true
  - type: input
    id: timeline
    attributes:
      label: Timeline
      placeholder: e.g. evaluating this quarter
  - type: textarea
    id: notes
    attributes:
      label: Anything else
