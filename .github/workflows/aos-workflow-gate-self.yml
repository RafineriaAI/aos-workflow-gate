name: AOS Workflow Gate Self

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  advisory:
    name: AOS Workflow Gate Self / advisory
    runs-on: ubuntu-latest
    steps:
      # Pinned from actions/checkout@v5 on 2026-07-03.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      # Pinned from actions/setup-python@v6 on 2026-07-03.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - name: Run gate (advisory)
        id: gate
        uses: ./
        with:
          input: examples/github-pr-signal-bundle.json
          policy: policies/default.yml
          out: .tmp/gate-decision.json
      - name: Check outputs
        env:
          VERDICT: ${{ steps.gate.outputs.verdict }}
          RECORD: ${{ steps.gate.outputs.record }}
        run: |
          test "$VERDICT" = "WARN"
          test -f "$RECORD"
          python3 -m aos_workflow_gate verify --input "$RECORD" \
            --bundle examples/github-pr-signal-bundle.json
      # Pinned from actions/upload-artifact@v7.0.1 on 2026-07-04.
      - name: Upload decision record
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gate-decision
          path: .tmp/gate-decision.json
